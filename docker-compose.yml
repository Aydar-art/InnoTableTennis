services:
  backend:
    build:
      context: TableTennisBackend
    container_name: innotabletennis-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - h2-data:/app/data
    environment:
      SPRING_PROFILES_ACTIVE: docker

  frontend:
    build:
      context: frontend
      args:
        PUBLIC_PROD_SERVER_URL: http://localhost:8080
        PROD_SERVER_URL: http://backend:8080
    container_name: innotabletennis-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  h2-data:
